<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futsal Stats">
<title>Futsal Stats</title>
<style>
  :root {
    --display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --a: #1a3a2a;
    --b: #1a1a3a;
    --green: #00e5a0;
    --orange: #ff6b35;
    --red: #ff3355;
    --blue: #4488ff;
    --bg: #0e0f14;
    --card: #16181f;
    --border: #1e2028;
    --muted: #4a4d5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: #e8eaf0; font-family: var(--body); min-height: 100vh; padding-bottom: 40px; padding-top: env(safe-area-inset-top); }

  header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  header h1 { font-family: var(--display); font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(90deg, #00e5a0, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; gap: 6px; align-items: center; }
  .reset-btn { background: none; border: 1px solid #2a2d38; color: #6b7080; font-size: 12px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-family: var(--body); }
  .confirm-btn { background: var(--red); border: none; color: #fff; font-size: 12px; font-weight: 700; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-family: var(--body); display: none; }
  .cancel-btn { background: none; border: 1px solid #2a2d38; color: #6b7080; font-size: 12px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-family: var(--body); display: none; }

  /* SCOREBOARD */
  .scoreboard {
    display: flex; align-items: center; justify-content: center; gap: 0;
    padding: 14px 16px 10px;
    background: #13141a;
    border-bottom: 1px solid var(--border);
  }
  .score-team { flex: 1; text-align: center; }
  .score-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; opacity: .5; margin-bottom: 2px; }
  .score-val { font-family: var(--display); font-size: 52px; font-weight: 900; line-height: 1; }
  .score-a { color: var(--green); }
  .score-b { color: var(--blue); }
  .score-sep { font-size: 36px; font-weight: 200; color: #2a2d38; padding: 0 12px; }

  /* TEAM SECTIONS */
  .teams { display: flex; flex-direction: column; gap: 0; }
  .team-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .team-section:first-child { border-right: none; }
  .team-header { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; padding: 4px 6px; border-radius: 6px; text-align: center; }
  .team-a-header { background: rgba(0,229,160,0.12); color: var(--green); }
  .team-b-header { background: rgba(68,136,255,0.12); color: var(--blue); }

  /* PLAYER ROW */
  .player-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 7px 8px;
  }
  .player-name {
    width: 76px;
    flex-shrink: 0;
    background: #1e2028;
    border: 1px solid #2a2d38;
    border-radius: 7px;
    color: #e8eaf0;
    font-family: var(--body);
    font-size: 12px;
    font-weight: 700;
    outline: none;
    padding: 7px 5px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }
  .player-name::placeholder { color: #3a3d4a; font-weight: 400; }
  .player-name:focus { border-color: #00e5a0; }
  .player-name::-webkit-calendar-picker-indicator { display: none; }
  .btns { display: flex; gap: 3px; flex: 1; }
  .btn-g, .btn-a, .btn-og, .btn-err {
    border: none; border-radius: 7px;
    font-family: var(--body); font-size: 11px; font-weight: 800;
    cursor: pointer; padding: 9px 0;
    transition: transform 0.1s;
    flex: 1; text-align: center;
  }
  .btn-g { background: var(--orange); color: #fff; }
  .btn-a { background: var(--green); color: #000; }
  .btn-og { background: var(--red); color: #fff; }
  .btn-err { background: #6633cc; color: #fff; }
  .btn-undo { background: #2a2d38; color: #aaa; font-size: 14px; padding: 9px 0; flex: none; width: 30px; border: 1px solid #3a3d4a; border-radius: 7px; cursor: pointer; }
  .btn-g:active, .btn-a:active, .btn-og:active, .btn-err:active, .btn-undo:active { transform: scale(0.90); }
  .counter { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .count-item { display: flex; flex-direction: column; align-items: center; min-width: 16px; }
  .count-val { font-family: var(--display); font-size: 15px; font-weight: 900; line-height: 1; }
  .count-val.g { color: var(--orange); }
  .count-val.a { color: var(--green); }
  .count-val.og { color: var(--red); }
  .count-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .divider { display: none; }
</style>
</head>
<body>

<header>
  <h1>⚽ Futsal Stats</h1>
  <div class="header-right">
    <button class="reset-btn" id="resetBtn">Limpar</button>
    <button class="confirm-btn" id="confirmBtn">✓ Confirmar</button>
    <button class="cancel-btn" id="cancelBtn">✕</button>
  </div>
</header>

<div class="scoreboard">
  <div class="score-team">
    <div class="score-label">Team A</div>
    <div class="score-val score-a" id="score-a">0</div>
  </div>
  <div class="score-sep">–</div>
  <div class="score-team">
    <div class="score-label">Team B</div>
    <div class="score-val score-b" id="score-b">0</div>
  </div>
</div>

<!-- Player suggestions list -->
<datalist id="players-list">
  <option value="João">
  <option value="Nuno">
  <option value="Diogo">
  <option value="Tiago">
  <option value="Mário">
  <option value="Pires">
  <option value="Brito">
  <option value="Hugo">
  <option value="Gonçalo">
  <option value="Simão">
  <option value="Vilaça">
  <option value="Resende">
  <option value="Kevin">
  <option value="Luís">
  <option value="Nuninho">
</datalist>
  <div class="team-section">
    <div class="team-header team-a-header">Team A</div>
    <div id="team-a"></div>
  </div>
  <div class="team-section">
    <div class="team-header team-b-header">Team B</div>
    <div id="team-b"></div>
  </div>
</div>

<script>
var N = 5; // players per team
var data = JSON.parse(localStorage.getItem('fss2') || 'null');
if (!data) {
  data = { a: [], b: [] };
  for (var x = 0; x < N; x++) {
    data.a.push({name:'', g:0, a:0, og:0, err:0});
    data.b.push({name:'', g:0, a:0, og:0, err:0});
  }
}
// Ensure og field exists (backwards compat)
['a','b'].forEach(function(t) {
  data[t].forEach(function(p) { if (p.og === undefined) p.og = 0; if (p.err === undefined) p.err = 0; });
});

function save() { localStorage.setItem('fss2', JSON.stringify(data)); }

function totalGoals(team) {
  // goals scored by team = own goals scored by team's players count for opponents
  // score for team = sum of goals + opponent own goals
  var ownGoals = data[team].reduce(function(s,p){return s+(p.og||0);},0);
  var opp = team === 'a' ? 'b' : 'a';
  var oppOwnGoals = data[opp].reduce(function(s,p){return s+(p.og||0);},0);
  var goals = data[team].reduce(function(s,p){return s+p.g;},0);
  return goals + oppOwnGoals;
}

function renderScoreboard() {
  document.getElementById('score-a').textContent = totalGoals('a');
  document.getElementById('score-b').textContent = totalGoals('b');
}

function renderTeam(team) {
  var el = document.getElementById('team-' + team);
  el.innerHTML = '';
  data[team].forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML =
      '<input class="player-name" list="players-list" value="' + (p.name||'') + '" placeholder="P' + (i+1) + '" data-team="' + team + '" data-i="' + i + '">' +
      '<div class="btns">' +
        '<button class="btn-g" data-team="' + team + '" data-i="' + i + '" data-type="g">⚽ G</button>' +
        '<button class="btn-a" data-team="' + team + '" data-i="' + i + '" data-type="a">🎯 A</button>' +
        '<button class="btn-og" data-team="' + team + '" data-i="' + i + '" data-type="og">OG</button>' +
        '<button class="btn-err" data-team="' + team + '" data-i="' + i + '" data-type="err">ERR</button>' +
        '<button class="btn-undo" data-team="' + team + '" data-i="' + i + '" data-type="undo">↩</button>' +
      '</div>' +
      '<div class="counter">' +
        '<div class="count-item"><span class="count-val g">' + p.g + '</span><span class="count-lbl">G</span></div>' +
        '<div class="count-item"><span class="count-val a">' + p.a + '</span><span class="count-lbl">A</span></div>' +
        '<div class="count-item"><span class="count-val og">' + (p.og||0) + '</span><span class="count-lbl">OG</span></div>' +
        '<div class="count-item"><span class="count-val" style="color:#6633cc">' + (p.err||0) + '</span><span class="count-lbl">ERR</span></div>' +
      '</div>';
    el.appendChild(row);
  });
}

function render() {
  renderTeam('a');
  renderTeam('b');
  renderScoreboard();
}

document.addEventListener('input', function(e) {
  if (e.target.classList.contains('player-name')) {
    var team = e.target.dataset.team;
    var i = parseInt(e.target.dataset.i);
    data[team][i].name = e.target.value;
    save();
  }
});

// Track last action per player for undo
var actionLog = []; // [{team, i, type}]

document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-type]');
  if (!btn) return;
  var team = btn.dataset.team;
  var i = parseInt(btn.dataset.i);
  var type = btn.dataset.type;

  if (type === 'undo') {
    // Find last action for this player
    for (var h = actionLog.length - 1; h >= 0; h--) {
      if (actionLog[h].team === team && actionLog[h].i === i) {
        var last = actionLog[h];
        if (data[last.team][last.i][last.type] > 0) {
          data[last.team][last.i][last.type]--;
        }
        actionLog.splice(h, 1);
        save();
        render();
        return;
      }
    }
    return;
  }

  data[team][i][type] = (data[team][i][type] || 0) + 1;
  actionLog.push({team, i, type});
  save();
  render();
});

document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('confirmBtn').style.display = 'inline-block';
  document.getElementById('cancelBtn').style.display = 'inline-block';
});
document.getElementById('cancelBtn').addEventListener('click', function() {
  document.getElementById('resetBtn').style.display = 'inline-block';
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
});
document.getElementById('confirmBtn').addEventListener('click', function() {
  ['a','b'].forEach(function(t) {
    data[t].forEach(function(p) { p.g = 0; p.a = 0; p.og = 0; p.err = 0; });
  });
  save();
  render();
  document.getElementById('resetBtn').style.display = 'inline-block';
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
});

render();
</script>
</body>
</html>
