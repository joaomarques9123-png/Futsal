<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futsal Stats">
<title>Futsal Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --green: #00e5a0; --orange: #ff6b35; --red: #ff3355; --blue: #4488ff; --purple: #6633cc;
    --bg: #0e0f14; --card: #16181f; --border: #1e2028; --muted: #4a4d5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: #e8eaf0; font-family: var(--body); min-height: 100vh; padding-bottom: 40px; padding-top: env(safe-area-inset-top); }

  /* NAV TABS */
  .nav { display: flex; background: #13141a; border-bottom: 1px solid var(--border); }
  .nav-tab { flex: 1; padding: 12px 6px; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  header h1 { font-family: var(--display); font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(90deg, #00e5a0, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; gap: 6px; align-items: center; }
  .reset-btn { background: none; border: 1px solid #2a2d38; color: #6b7080; font-size: 12px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  .confirm-btn { background: var(--red); border: none; color: #fff; font-size: 12px; font-weight: 700; padding: 6px 10px; border-radius: 6px; cursor: pointer; display: none; }
  .cancel-btn { background: none; border: 1px solid #2a2d38; color: #6b7080; font-size: 12px; padding: 6px 8px; border-radius: 6px; cursor: pointer; display: none; }

  /* SCOREBOARD */
  .scoreboard { display: flex; align-items: center; justify-content: center; padding: 14px 16px 10px; background: #13141a; border-bottom: 1px solid var(--border); }
  .score-team { flex: 1; text-align: center; }
  .score-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; opacity: .5; margin-bottom: 2px; }
  .score-val { font-family: var(--display); font-size: 52px; font-weight: 900; line-height: 1; }
  .score-a { color: var(--green); } .score-b { color: var(--blue); }
  .score-sep { font-size: 36px; font-weight: 200; color: #2a2d38; padding: 0 12px; }

  /* TEAM SECTIONS */
  .teams { display: flex; flex-direction: column; }
  .team-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .team-header { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; padding: 4px 6px; border-radius: 6px; text-align: center; }
  .team-a-header { background: rgba(0,229,160,0.12); color: var(--green); }
  .team-b-header { background: rgba(68,136,255,0.12); color: var(--blue); }

  /* PLAYER ROW */
  .player-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 7px 8px; }
  .player-name { width: 76px; flex-shrink: 0; background: #1e2028; border: 1px solid #2a2d38; border-radius: 7px; color: #e8eaf0; font-family: var(--body); font-size: 12px; font-weight: 700; outline: none; padding: 7px 5px; appearance: none; -webkit-appearance: none; cursor: pointer; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
  .player-name::placeholder { color: #3a3d4a; font-weight: 400; }
  .player-name:focus { border-color: var(--green); }
  .player-name::-webkit-calendar-picker-indicator { display: none; }
  .btns { display: flex; gap: 3px; flex: 1; }
  .btn-g, .btn-a, .btn-og, .btn-err { border: none; border-radius: 7px; font-family: var(--body); font-size: 11px; font-weight: 800; cursor: pointer; padding: 9px 0; transition: transform 0.1s; flex: 1; text-align: center; }
  .btn-g { background: var(--orange); color: #fff; }
  .btn-a { background: var(--green); color: #000; }
  .btn-og { background: var(--red); color: #fff; }
  .btn-err { background: var(--purple); color: #fff; }
  .btn-undo { background: #2a2d38; color: #aaa; font-size: 14px; padding: 9px 0; flex: none; width: 30px; border: 1px solid #3a3d4a; border-radius: 7px; cursor: pointer; }
  .btn-g:active, .btn-a:active, .btn-og:active, .btn-err:active, .btn-undo:active { transform: scale(0.90); }
  .counter { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .count-item { display: flex; flex-direction: column; align-items: center; min-width: 16px; }
  .count-val { font-family: var(--display); font-size: 15px; font-weight: 900; line-height: 1; }
  .count-val.g { color: var(--orange); } .count-val.a { color: var(--green); } .count-val.og { color: var(--red); }
  .count-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  /* UPLOAD TAB */
  .upload-wrap { padding: 20px 16px; }
  .upload-drop { border: 2px dashed #2a2d38; border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; transition: border-color .2s; background: var(--card); }
  .upload-drop.drag { border-color: var(--green); }
  .upload-drop input { display: none; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-label { font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 6px; }
  .upload-sub { font-size: 12px; color: var(--muted); }
  .upload-status { margin-top: 14px; font-size: 13px; color: var(--green); font-weight: 600; text-align: center; min-height: 20px; }
  .date-select-wrap { margin-top: 20px; display: none; }
  .date-select-wrap label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); display: block; margin-bottom: 8px; }
  .date-select { width: 100%; background: var(--card); border: 1px solid #2a2d38; color: #e8eaf0; font-family: var(--body); font-size: 14px; padding: 10px 12px; border-radius: 8px; outline: none; appearance: none; }
  .date-select:focus { border-color: var(--green); }
  .autofill-btn { margin-top: 12px; width: 100%; padding: 13px; background: var(--green); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; letter-spacing: .04em; }
  .autofill-btn:active { opacity: .8; }
  .autofill-result { margin-top: 12px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>⚽ Futsal Stats</h1>
  <div class="header-right">
    <button class="reset-btn" id="resetBtn">Limpar</button>
    <button class="confirm-btn" id="confirmBtn">✓ Confirmar</button>
    <button class="cancel-btn" id="cancelBtn">✕</button>
  </div>
</header>

<div class="nav">
  <div class="nav-tab active" onclick="showTab('stats')">📊 Stats</div>
  <div class="nav-tab" onclick="showTab('upload')">📂 Upload</div>
</div>

<!-- STATS PAGE -->
<div class="page active" id="page-stats">
  <div class="scoreboard">
    <div class="score-team"><div class="score-label">Team A</div><div class="score-val score-a" id="score-a">0</div></div>
    <div class="score-sep">–</div>
    <div class="score-team"><div class="score-label">Team B</div><div class="score-val score-b" id="score-b">0</div></div>
  </div>
  <datalist id="players-list">
    <option value="João"><option value="Nuno"><option value="Diogo"><option value="Tiago">
    <option value="Mário"><option value="Pires"><option value="Brito"><option value="Hugo">
    <option value="Gonçalo"><option value="Simão"><option value="Vilaça"><option value="Resende">
    <option value="Kevin"><option value="Luís"><option value="Nuninho">
  </datalist>
  <div class="teams">
    <div class="team-section"><div class="team-header team-a-header">Team A</div><div id="team-a"></div></div>
    <div class="team-section"><div class="team-header team-b-header">Team B</div><div id="team-b"></div></div>
  </div>
</div>

<!-- UPLOAD PAGE -->
<div class="page" id="page-upload">
  <div class="upload-wrap">
    <div class="upload-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📂</div>
      <div class="upload-label">Tap to upload Excel</div>
      <div class="upload-sub">2026_-_Futebol.xlsx</div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>
    <div class="upload-status" id="uploadStatus"></div>

    <div class="date-select-wrap" id="dateSelectWrap">
      <label>Choose a game date to auto-fill players</label>
      <select class="date-select" id="dateSelect">
        <option value="">— Select date —</option>
      </select>
      <button class="autofill-btn" onclick="autofill()">⚡ Auto-fill Teams</button>
      <div class="autofill-result" id="autofillResult"></div>
    </div>
  </div>
</div>

<script>
var N = 5;
var data = JSON.parse(localStorage.getItem('fss2') || 'null');
if (!data) {
  data = { a: [], b: [] };
  for (var x = 0; x < N; x++) {
    data.a.push({name:'', g:0, a:0, og:0, err:0});
    data.b.push({name:'', g:0, a:0, og:0, err:0});
  }
}
['a','b'].forEach(function(t) {
  data[t].forEach(function(p) {
    if (p.og === undefined) p.og = 0;
    if (p.err === undefined) p.err = 0;
  });
});

var gamesData = {}; // date string -> {a: [names], b: [names]}
var actionLog = [];

function save() { localStorage.setItem('fss2', JSON.stringify(data)); }

function showTab(tab) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('page-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function totalGoals(team) {
  var opp = team === 'a' ? 'b' : 'a';
  return data[team].reduce(function(s,p){return s+p.g;},0)
       + data[opp].reduce(function(s,p){return s+(p.og||0);},0);
}

function renderScoreboard() {
  document.getElementById('score-a').textContent = totalGoals('a');
  document.getElementById('score-b').textContent = totalGoals('b');
}

function renderTeam(team) {
  var el = document.getElementById('team-' + team);
  el.innerHTML = '';
  data[team].forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML =
      '<input class="player-name" list="players-list" value="' + (p.name||'') + '" placeholder="P' + (i+1) + '" data-team="' + team + '" data-i="' + i + '">' +
      '<div class="btns">' +
        '<button class="btn-g" data-team="' + team + '" data-i="' + i + '" data-type="g">⚽ G</button>' +
        '<button class="btn-a" data-team="' + team + '" data-i="' + i + '" data-type="a">🎯 A</button>' +
        '<button class="btn-og" data-team="' + team + '" data-i="' + i + '" data-type="og">OG</button>' +
        '<button class="btn-err" data-team="' + team + '" data-i="' + i + '" data-type="err">ERR</button>' +
        '<button class="btn-undo" data-team="' + team + '" data-i="' + i + '" data-type="undo">↩</button>' +
      '</div>' +
      '<div class="counter">' +
        '<div class="count-item"><span class="count-val g">' + p.g + '</span><span class="count-lbl">G</span></div>' +
        '<div class="count-item"><span class="count-val a">' + p.a + '</span><span class="count-lbl">A</span></div>' +
        '<div class="count-item"><span class="count-val og">' + (p.og||0) + '</span><span class="count-lbl">OG</span></div>' +
        '<div class="count-item"><span class="count-val" style="color:var(--purple)">' + (p.err||0) + '</span><span class="count-lbl">ERR</span></div>' +
      '</div>';
    el.appendChild(row);
  });
}

function render() { renderTeam('a'); renderTeam('b'); renderScoreboard(); }

document.addEventListener('input', function(e) {
  if (e.target.classList.contains('player-name')) {
    data[e.target.dataset.team][parseInt(e.target.dataset.i)].name = e.target.value;
    save();
  }
});

document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-type]');
  if (!btn) return;
  var team = btn.dataset.team;
  var i = parseInt(btn.dataset.i);
  var type = btn.dataset.type;
  if (!team || isNaN(i)) return;

  if (type === 'undo') {
    for (var h = actionLog.length - 1; h >= 0; h--) {
      if (actionLog[h].team === team && actionLog[h].i === i) {
        var last = actionLog[h];
        if (data[last.team][last.i][last.type] > 0) data[last.team][last.i][last.type]--;
        actionLog.splice(h, 1);
        save(); render(); return;
      }
    }
    return;
  }
  data[team][i][type] = (data[team][i][type] || 0) + 1;
  actionLog.push({team: team, i: i, type: type});
  save(); render();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('confirmBtn').style.display = 'inline-block';
  document.getElementById('cancelBtn').style.display = 'inline-block';
});
document.getElementById('cancelBtn').addEventListener('click', function() {
  document.getElementById('resetBtn').style.display = 'inline-block';
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
});
document.getElementById('confirmBtn').addEventListener('click', function() {
  ['a','b'].forEach(function(t) {
    data[t].forEach(function(p) { p.g = 0; p.a = 0; p.og = 0; p.err = 0; });
  });
  actionLog = [];
  save(); render();
  document.getElementById('resetBtn').style.display = 'inline-block';
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
});

// ── UPLOAD & AUTO-FILL ──
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(ev.target.result, {type:'array'});
      var ws = wb.Sheets['Games'];
      if (!ws) { document.getElementById('uploadStatus').textContent = '❌ Games sheet not found'; return; }
      var rows = XLSX.utils.sheet_to_json(ws);
      
      // Build games map: dateStr -> {a:[names], b:[names]}
      gamesData = {};
      rows.forEach(function(r) {
        if (!r['ID_Jogo'] || !r['Data'] || !r['Jogador'] || !r['Equipa']) return;
        // Parse date
        var d = r['Data'];
        var dateObj;
        if (typeof d === 'number') {
          // Excel serial date
          dateObj = new Date(Math.round((d - 25569) * 86400 * 1000));
        } else {
          dateObj = new Date(d);
        }
        var dateStr = dateObj.toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'});
        var gameKey = r['ID_Jogo'] + '|' + dateStr;
        if (!gamesData[gameKey]) gamesData[gameKey] = {a:[], b:[], label: '#'+r['ID_Jogo']+' — '+dateStr};
        var team = (r['Equipa']+'').toUpperCase() === 'A' ? 'a' : 'b';
        if (!gamesData[gameKey][team].includes(r['Jogador'])) {
          gamesData[gameKey][team].push(r['Jogador']);
        }
      });

      // Populate date dropdown — sorted by game ID descending (most recent first)
      var sel = document.getElementById('dateSelect');
      sel.innerHTML = '<option value="">— Select game —</option>';
      Object.keys(gamesData).sort().reverse().forEach(function(key) {
        var opt = document.createElement('option');
        opt.value = key;
        opt.textContent = gamesData[key].label;
        sel.appendChild(opt);
      });

      document.getElementById('dateSelectWrap').style.display = 'block';
      document.getElementById('uploadStatus').textContent = '✅ ' + Object.keys(gamesData).length + ' games loaded';
    } catch(err) {
      document.getElementById('uploadStatus').textContent = '❌ Error reading file: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
});

function autofill() {
  var key = document.getElementById('dateSelect').value;
  if (!key || !gamesData[key]) {
    document.getElementById('autofillResult').textContent = 'Please select a game first.';
    return;
  }
  var game = gamesData[key];

  // Fill team A and B names, reset stats
  ['a','b'].forEach(function(t) {
    var players = game[t];
    data[t].forEach(function(p, i) {
      p.name = players[i] || '';
      p.g = 0; p.a = 0; p.og = 0; p.err = 0;
    });
  });
  actionLog = [];
  save(); render();

  document.getElementById('autofillResult').textContent = '✅ Teams filled — tap Stats to start recording';
  // Switch to stats tab after short delay
  setTimeout(function() {
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
    document.getElementById('page-stats').classList.add('active');
    document.querySelector('.nav-tab').classList.add('active');
  }, 800);
}

render();
</script>
</body>
</html>
