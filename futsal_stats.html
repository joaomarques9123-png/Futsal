<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Futsal Stats">
<title>Futsal Stats</title>
<style>
  @import url("data:text/css,");

  :root {
    --display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0e0f14;
    color: #e8eaf0;
    font-family: var(--body);
    min-height: 100vh;
    padding-bottom: 40px;
    padding-top: env(safe-area-inset-top);
  }

  header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid #1e2028;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  header h1 {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #00e5a0, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right { display: flex; gap: 8px; align-items: center; }

  .reset-btn {
    background: none;
    border: 1px solid #2a2d38;
    color: #6b7080;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--body);
  }
  .confirm-btn {
    background: #ff3333;
    border: none;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--body);
    display: none;
  }
  .cancel-btn {
    background: none;
    border: 1px solid #2a2d38;
    color: #6b7080;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--body);
    display: none;
  }

  .players {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 560px;
    margin: 0 auto;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #16181f;
    border: 1px solid #1e2028;
    border-radius: 12px;
    padding: 10px 12px;
  }

  .player-name {
    flex: 1;
    background: none;
    border: none;
    color: #e8eaf0;
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    outline: none;
    min-width: 0;
  }
  .player-name::placeholder { color: #3a3d4a; }

  .btn-g, .btn-a {
    border: none;
    border-radius: 7px;
    font-family: var(--body);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    padding: 8px 11px;
    white-space: nowrap;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .btn-g { background: #ff6b35; color: #fff; }
  .btn-a { background: #00e5a0; color: #000; }
  .btn-g:active, .btn-a:active { transform: scale(0.92); opacity: 0.8; }

  .divider { width: 1px; height: 22px; background: #2a2d38; flex-shrink: 0; }

  .counter { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

  .count-item { display: flex; flex-direction: column; align-items: center; min-width: 26px; }

  .count-val {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }
  .count-val.g { color: #ff6b35; }
  .count-val.a { color: #00e5a0; }

  .count-lbl {
    font-size: 9px;
    color: #4a4d5a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>⚽ Futsal Stats</h1>
  <div class="header-right">
    <button class="reset-btn" id="resetBtn">Limpar tudo</button>
    <button class="confirm-btn" id="confirmBtn">✓ Confirmar</button>
    <button class="cancel-btn" id="cancelBtn">✕</button>
  </div>
</header>

<div class="players" id="playerList"></div>

<script>
  var N = 10;
  var data = JSON.parse(localStorage.getItem('fss') || 'null');
  if (!data) {
    data = [];
    for (var x = 0; x < N; x++) data.push({name:'', g:0, a:0});
  }

  function save() {
    localStorage.setItem('fss', JSON.stringify(data));
  }

  function render() {
    var list = document.getElementById('playerList');
    list.innerHTML = '';
    for (var i = 0; i < data.length; i++) {
      var p = data[i];
      var row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML =
        '<input class="player-name" value="' + p.name + '" placeholder="Jogador ' + (i+1) + '" data-i="' + i + '">' +
        '<button class="btn-g" data-i="' + i + '" data-type="g">⚽ G</button>' +
        '<button class="btn-a" data-i="' + i + '" data-type="a">🎯 A</button>' +
        '<div class="divider"></div>' +
        '<div class="counter">' +
          '<div class="count-item"><span class="count-val g">' + p.g + '</span><span class="count-lbl">G</span></div>' +
          '<div class="count-item"><span class="count-val a">' + p.a + '</span><span class="count-lbl">A</span></div>' +
        '</div>';
      list.appendChild(row);
    }
  }

  document.getElementById('playerList').addEventListener('input', function(e) {
    if (e.target.classList.contains('player-name')) {
      data[parseInt(e.target.dataset.i)].name = e.target.value;
      save();
    }
  });

  document.getElementById('playerList').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-type]');
    if (!btn) return;
    var i = parseInt(btn.dataset.i);
    data[i][btn.dataset.type]++;
    save();
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('confirmBtn').style.display = 'inline-block';
    document.getElementById('cancelBtn').style.display = 'inline-block';
  });

  document.getElementById('cancelBtn').addEventListener('click', function() {
    document.getElementById('resetBtn').style.display = 'inline-block';
    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
  });

  document.getElementById('confirmBtn').addEventListener('click', function() {
    for (var i = 0; i < data.length; i++) { data[i].g = 0; data[i].a = 0; }
    save();
    render();
    document.getElementById('resetBtn').style.display = 'inline-block';
    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
  });

  render();
</script>
</body>
</html>
